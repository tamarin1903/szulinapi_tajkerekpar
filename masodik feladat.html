<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Állomás 2</title>

  <style>
    body {
      background-color: #f0f4f8;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .kartya {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      width: 320px;
    }

    h1 {
      color: #4a90e2;
    }

    button {
      background-color: #4a90e2;
      color: white;
      padding: 15px;
      border: none;
      border-radius: 15px;
      font-size: 16px;
      margin-top: 20px;
      width: 100%;
      cursor: pointer;
    }

    input {
      padding: 10px;
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    #kep {
      width: 100%;
      margin-top: 15px;
      display: none;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="kartya">
  <h1>🌲 Állomás 2</h1>
  <p>Hány szigeten nyaraltunk?</p>

  <input id="valasz" placeholder="Írd ide a választ">

  <button onclick="ellenoriz()">Ellenőrzés</button>

  <img id="kep" src="rossz.jpg" style="display:none;">
</div>

<script>
function ellenoriz() {
  let valasz = document.getElementById("valasz").value.trim();
  let kep = document.getElementById("kep");

  if (valasz === "5") {
    alert("Tye! Mehetsz tovább a következő ponthoz.");
    kep.style.display = "none";
  } else {
    alert("Csúnya vagy!");
    kep.style.display = "block";
  }
}
</script>

</body>
</html>
